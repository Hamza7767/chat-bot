<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conzummate AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .chat-card { width: 440px; max-width: 95vw; height: 580px; background: #ffffff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #0f172a; color: #ffffff; padding: 18px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #1e293b; }
        .avatar { width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
        .header-title { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.5px; }
        
        .chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; background: #fafafa; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 0.92rem; line-height: 1.45; word-wrap: break-word; }
        .user-msg { background: #2563eb; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-msg { background: #e2e8f0; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .chat-footer { padding: 15px; background: #ffffff; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 12px 18px; border: 1px solid #cbd5e1; border-radius: 30px; outline: none; font-size: 0.92rem; transition: border 0.2s; }
        .chat-input:focus { border-color: #2563eb; }
        .send-button { background: #2563eb; color: white; border: none; padding: 0 22px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: background 0.2s; }
        .send-button:hover { background: #1d4ed8; }
        
        .typing-dots { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
        .dot { width: 6px; height: 6px; background: #64748b; border-radius: 50%; animation: pulse 1.2s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.3); opacity: 1; } }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="chat-header">
        <div class="avatar"></div>
        <div class="header-title">Conzummate Virtual Assistant</div>
    </div>
    
    <div class="chat-body" id="chatBody">
        <div class="msg bot-msg">Hello! Welcome to Conzummate. How can I assist you today regarding our services, portfolio, or company operations?</div>
    </div>
    
    <div class="chat-footer">
        <input type="text" id="chatInput" class="chat-input" placeholder="Ask about Conzummate..." autocomplete="off">
        <button id="sendBtn" class="send-button">Send</button>
    </div>
</div>

<script>
    const chatBody = document.getElementById('chatBody');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    function appendMessage(message, isUser) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isUser ? 'user-msg' : 'bot-msg'}`;
        msgDiv.textContent = message;
        chatBody.appendChild(msgDiv);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    async function sendMessage() {
        const message = chatInput.value.trim();
        if (!message) return;

        appendMessage(message, true);
        chatInput.value = '';

        try {
            // Yeh relative path Vercel live aur Localhost dono par perfectly kaam karega
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: message })
            });

            const data = await response.json();
            appendMessage(data.response, false);
        } catch (error) {
            console.error(error);
            appendMessage('Connection error. Please try again.', false);
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
